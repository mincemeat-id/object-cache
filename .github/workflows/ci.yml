name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  lint-and-unit:
    name: Lint and Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis-6.3.0
          coverage: xdebug
          ini-values: zend.assertions=1, error_reporting=-1

      - name: Composer self-update
        run: composer self-update --2

      - name: Composer validate
        run: composer validate --strict --no-check-lock

      - name: Get composer cache key
        id: composer-cache
        run: echo "key=$(php -r 'echo PHP_VERSION;')-$(sha256sum composer.json)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ steps.composer-cache.outputs.key }}

      - name: Composer update
        run: composer update --prefer-dist --no-interaction

      - name: PHP Lint
        run: find src stubs tools mincemeat-object-cache.php -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: PHPCS
        run: composer lint

      - name: PHPStan
        run: composer stan -- --error-format=github

      - name: PHPUnit unit tests
        run: |
          vendor/bin/phpunit --group unit,contract --coverage-text | tee phpunit.log
          ! grep -q "No tests executed!" phpunit.log

  compatibility:
    name: PHP Compatibility (7.4)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: redis-6.3.0
          coverage: none

      - name: Get composer cache key
        id: composer-cache
        run: echo "key=$(php -r 'echo PHP_VERSION;')-$(sha256sum composer.json)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ steps.composer-cache.outputs.key }}

      - name: Composer install
        run: composer update --prefer-dist --no-interaction

      - name: PHPCompatibility
        run: vendor/bin/phpcs --standard=PHPCompatibility -p src stubs tools mincemeat-object-cache.php --runtime-set testVersion 7.4

  controlled-performance:
    name: Controlled RC1 to RC2 Performance Evidence
    runs-on: ubuntu-24.04
    services:
      redis:
        image: redis:8.8.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout with immutable RC1 tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup controlled PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: redis-6.3.0
          coverage: none
          ini-values: opcache.enable_cli=0

      - name: Capture backend image and run benchmark evidence
        env:
          MINCEMEAT_BENCHMARK_RUNNER: github-hosted-ubuntu-24.04-x64
        run: |
          BENCHMARK_IMAGE_DIGEST=$(docker image inspect redis:8.8.0-alpine --format '{{.Id}}')
          echo "MINCEMEAT_BENCHMARK_BACKEND_IMAGE_DIGEST=$BENCHMARK_IMAGE_DIGEST" >> "$GITHUB_ENV"
          export MINCEMEAT_BENCHMARK_BACKEND_IMAGE_DIGEST="$BENCHMARK_IMAGE_DIGEST"
          bash tools/run-controlled-benchmarks.sh 127.0.0.1 6379 build/benchmarks

      - name: Upload controlled benchmark evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rc2-controlled-performance-evidence
          path: build/benchmarks/
          if-no-files-found: error

  e2e:
    name: WordPress ${{ matrix.wordpress }} Browser and WP-CLI E2E
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wordpress:
          - '6.9.5'
          - '7.0.2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run isolated E2E suite
        env:
          MINCEMEAT_E2E_WORDPRESS_VERSION: ${{ matrix.wordpress }}
        run: composer test:e2e

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-browser-failure-artifacts
          path: tests/e2e/test-results/
          if-no-files-found: ignore

  lifecycle-e2e:
    name: Packaged RC1 Upgrade and Rollback E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup package builder
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: zip
          coverage: none

      - name: Run packaged lifecycle E2E suite
        env:
          MINCEMEAT_E2E_WORDPRESS_VERSION: '7.0.2'
        run: composer test:e2e:lifecycle

  integration:
    name: Integration (WP ${{ matrix.wordpress }}, PHP ${{ matrix.php }}, ${{ matrix.backend }}, multisite=${{ matrix.multisite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        backend:
          - redis8
          - valkey9
        multisite:
          - false
          - true
        wordpress:
          - '6.9.5'
        include:
          - php: '8.4'
            backend: redis8
            multisite: false
            wordpress: '7.0.2'
          - php: '8.4'
            backend: redis8
            multisite: true
            wordpress: '7.0.2'
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:9-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis-6.3.0
          coverage: pcov
          ini-values: zend.assertions=1, error_reporting=-1

      - name: Select backend endpoint
        run: |
          echo "MINCEMEAT_TEST_REDIS_PORT=${{ matrix.backend == 'redis8' && '6379' || '6380' }}" >> "$GITHUB_ENV"
          echo "MINCEMEAT_TEST_VALKEY_PORT=6380" >> "$GITHUB_ENV"
          echo "MINCEMEAT_TEST_DB_PORT=3306" >> "$GITHUB_ENV"

      - name: Set multisite env
        if: ${{ matrix.multisite }}
        run: echo "WP_MULTISITE=1" >> "$GITHUB_ENV"

      - name: Get composer cache key
        id: composer-cache
        run: echo "key=$(php -r 'echo PHP_VERSION;')-$(sha256sum composer.json)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ steps.composer-cache.outputs.key }}

      - name: Composer install
        run: composer update --prefer-dist --no-interaction

      - name: Build plugin package ZIP
        run: php tools/build-package.php

      - name: Install WordPress Test Infrastructure
        env:
          WP_VERSION: ${{ matrix.wordpress }}
        run: bash tools/install-wp-tests.sh

      - name: Verify WordPress test provenance
        run: bash tools/verify-wp-test-provenance.sh

      - name: Setup connection scenario test services
        run: bash tools/setup-test-services.sh

      - name: Run Test Suite with Coverage
        env:
          MINCEMEAT_TEST_REDIS_HOST: 127.0.0.1
          MINCEMEAT_REQUIRE_INTEGRATION: 1
          MINCEMEAT_EXPECTED_BACKEND: ${{ matrix.backend == 'redis8' && 'redis' || 'valkey' }}
          MINCEMEAT_RELEASE_CI: 1
          MINCEMEAT_TEST_UNIX_SOCKET: /tmp/redis-socket/redis.sock
          MINCEMEAT_TEST_ACL_PORT: 6381
          MINCEMEAT_TEST_ACL_USER: myuser
          MINCEMEAT_TEST_ACL_PASS: mypassword
          MINCEMEAT_TEST_TLS_PORT: 6382
          MINCEMEAT_TEST_TLS_CA: ${{ github.workspace }}/tests/certs/ca.crt
          MINCEMEAT_TEST_TLS_UNTRUSTED_CA: ${{ github.workspace }}/tests/certs/untrusted-ca.crt
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Verify Code Coverage Thresholds
        run: php tools/verify-coverage.php

      - name: Run Plugin Smoke Tests
        env:
          MINCEMEAT_TEST_REDIS_HOST: 127.0.0.1
          MINCEMEAT_TEST_REDIS_PORT: ${{ env.MINCEMEAT_TEST_REDIS_PORT }}
        run: php tools/run-smoke-tests.php

      - name: Capture logs on failure
        if: failure()
        run: |
          mkdir -p build/logs
          docker logs redis-unix > build/logs/redis-unix.log 2>&1 || true
          docker logs redis-acl > build/logs/redis-acl.log 2>&1 || true
          docker logs redis-tls > build/logs/redis-tls.log 2>&1 || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-failure-logs-php-${{ matrix.php }}-backend-${{ matrix.backend }}-multisite-${{ matrix.multisite }}
          path: build/logs/

  artifact-parity:
    name: Artifact Parity (drop-in)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: redis-6.3.0
          coverage: none

      - name: Get composer cache key
        id: composer-cache
        run: echo "key=$(php -r 'echo PHP_VERSION;')-$(sha256sum composer.json)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ steps.composer-cache.outputs.key }}

      - name: Composer install
        run: composer update --prefer-dist --no-interaction

      - name: Build drop-in
        run: |
          if [ -f tools/build-dropin.php ]; then
            php tools/build-dropin.php
          else
            echo "tools/build-dropin.php not found; skipping build."
          fi

      - name: Verify parity of drop-in and checksum
        run: |
          if [ -f stubs/object-cache.php ] && [ -f stubs/object-cache.php.sha256 ]; then
            git diff --exit-code stubs/object-cache.php stubs/object-cache.php.sha256
          else
            echo "stubs/object-cache.php or its checksum sidecar not found; failing verification."
            exit 1
          fi

      - name: Secret scan check
        run: |
          # Verify that no private keys, certificates, or stray credential files are tracked in git
          git ls-files | grep -E '\.key$|\.pem$|^mypassword$' && exit 1 || echo "No tracked secrets found."

      - name: Build plugin package
        run: php tools/build-package.php

      - name: Verify package artifacts are ignored in git
        run: |
          git status --porcelain | grep -E 'mincemeat-object-cache.zip|mincemeat-object-cache.zip.sha256|manifest.json' && exit 1 || echo "Package artifacts are correctly ignored."

      - name: Verify package determinism
        run: |
          php tools/build-package.php
          HASH1=$(sha256sum mincemeat-object-cache.zip | awk '{print $1}')
          php tools/build-package.php
          HASH2=$(sha256sum mincemeat-object-cache.zip | awk '{print $1}')
          if [ "$HASH1" != "$HASH2" ]; then
            echo "Error: Package build is not deterministic! ($HASH1 vs $HASH2)"
            exit 1
          fi
          echo "Package build is deterministic."

      - name: Run ZIP allowlist check
        run: |
          # List files inside the generated zip and check against the allowlist
          unzip -l mincemeat-object-cache.zip | awk '{print $4}' | grep '^mincemeat-object-cache/' | sort > zip_files.txt
          cat zip_files.txt
          
          # Dynamically construct the expected list of files
          (
            echo "mincemeat-object-cache/CHANGELOG.md"
            echo "mincemeat-object-cache/LICENSE"
            echo "mincemeat-object-cache/README.md"
            echo "mincemeat-object-cache/mincemeat-object-cache.php"
            echo "mincemeat-object-cache/readme.txt"
            for f in src/*.php; do
              echo "mincemeat-object-cache/$f"
            done
            echo "mincemeat-object-cache/stubs/object-cache.php"
            echo "mincemeat-object-cache/stubs/object-cache.php.sha256"
          ) | sort > expected_files.txt
          
          diff -u expected_files.txt zip_files.txt || (echo "Error: ZIP contents do not match allowlist!" && exit 1)
          echo "ZIP allowlist check passed."
          rm expected_files.txt zip_files.txt
