name: Scheduled

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  integration:
    name: Integration (PHP ${{ matrix.php }}, ${{ matrix.backend }}, multisite=${{ matrix.multisite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        backend:
          - redis8
          - valkey9
        multisite:
          - false
          - true
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:9-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis-6.3.0
          coverage: pcov
          ini-values: zend.assertions=1, error_reporting=-1

      - name: Select backend endpoint
        run: |
          echo "MINCEMEAT_TEST_REDIS_PORT=${{ matrix.backend == 'redis8' && '6379' || '6380' }}" >> "$GITHUB_ENV"
          echo "MINCEMEAT_TEST_VALKEY_PORT=6380" >> "$GITHUB_ENV"
          echo "MINCEMEAT_TEST_DB_PORT=3306" >> "$GITHUB_ENV"

      - name: Set multisite env
        if: ${{ matrix.multisite }}
        run: echo "WP_MULTISITE=1" >> "$GITHUB_ENV"

      - name: Get composer cache key
        id: composer-cache
        run: echo "key=$(php -r 'echo PHP_VERSION;')-$(sha256sum composer.json)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ steps.composer-cache.outputs.key }}

      - name: Composer update
        run: composer update --prefer-dist --no-interaction

      - name: Build plugin package ZIP
        run: php tools/build-package.php

      - name: Install WordPress Test Infrastructure
        run: bash tools/install-wp-tests.sh

      - name: Verify WordPress test provenance
        run: bash tools/verify-wp-test-provenance.sh

      - name: Setup connection scenario test services
        run: bash tools/setup-test-services.sh

      - name: Run Test Suite with Coverage
        env:
          MINCEMEAT_TEST_REDIS_HOST: 127.0.0.1
          MINCEMEAT_REQUIRE_INTEGRATION: 1
          MINCEMEAT_EXPECTED_BACKEND: ${{ matrix.backend == 'redis8' && 'redis' || 'valkey' }}
          MINCEMEAT_RELEASE_CI: 1
          MINCEMEAT_TEST_UNIX_SOCKET: /tmp/redis-socket/redis.sock
          MINCEMEAT_TEST_ACL_PORT: 6381
          MINCEMEAT_TEST_ACL_USER: myuser
          MINCEMEAT_TEST_ACL_PASS: mypassword
          MINCEMEAT_TEST_TLS_PORT: 6382
          MINCEMEAT_TEST_TLS_CA: ${{ github.workspace }}/tests/certs/ca.crt
          MINCEMEAT_TEST_TLS_UNTRUSTED_CA: ${{ github.workspace }}/tests/certs/untrusted-ca.crt
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Verify Code Coverage Thresholds
        run: php tools/verify-coverage.php

      - name: Run Plugin Smoke Tests
        env:
          MINCEMEAT_TEST_REDIS_HOST: 127.0.0.1
          MINCEMEAT_TEST_REDIS_PORT: ${{ env.MINCEMEAT_TEST_REDIS_PORT }}
        run: php tools/run-smoke-tests.php
