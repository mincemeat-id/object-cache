# Development services for integration tests. Isolated databases/namespaces are used per test process.
services:
  redis8:
    image: redis:8-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6383:6379"

  valkey9:
    image: valkey/valkey:9-alpine
    command: valkey-server --save "" --appendonly no
    ports:
      - "6384:6379"

  mariadb:
    image: mariadb:11.8
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: wordpress_test
    ports:
      - "33076:3306"