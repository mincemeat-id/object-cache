# Development services for integration tests. Isolated databases/namespaces are used per test process.
services:
  redis8:
    image: redis:8-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

  valkey9:
    image: valkey/valkey:9-alpine
    command: valkey-server --save "" --appendonly no
    ports:
      - "6380:6379"